  <body>
    <div id="error-log" style="color: red; padding: 20px; font-family: monospace; z-index: 9999; position: relative;"></div>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        document.getElementById('error-log').innerHTML += '<p>' + message + '</p>';
      };
      window.addEventListener('unhandledrejection', function(event) {
        document.getElementById('error-log').innerHTML += '<p>' + event.reason + '</p>';
      });
    </script>

  </body>
